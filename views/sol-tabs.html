<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sol-tabs Demo</title>
  <style>
    :root {
      --border: #e0e0e0;
      --text-muted: #666;
      --accent-dark: #1976d2;
      --bg-light: #f5f5f5;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #fafafa;
    }
    
    h1 {
      color: #333;
      margin-bottom: 8px;
    }
    
    .demo-section {
      margin-bottom: 40px;
    }
    
    .demo-container {
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .demo-container.with-footer {
      display: flex;
      flex-direction: column;
      height: 400px;
    }
    
    .demo-footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      background: var(--bg-light);
      flex-shrink: 0;
    }
    
    .demo-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    
    button.action-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9em;
    }
    
    button.action-btn.primary {
      background: var(--accent-dark);
      color: white;
      border-color: var(--accent-dark);
    }
    
    .event-log {
      margin-top: 12px;
      padding: 12px;
      background: #f9f9f9;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
      max-height: 100px;
      overflow-y: auto;
    }
    
    .content-block {
      padding: 12px;
      background: var(--bg-light);
      border-radius: 4px;
      margin-bottom: 12px;
    }
    
    .content-block h3 {
      margin-top: 0;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>sol-tabs Component Demo</h1>
  <p>Interactive examples of the tabbed content container</p>

  <div class="demo-section">
    <h2>Basic Tabs</h2>
    <div class="demo-container">
      <sol-tabs id="basic-tabs"></sol-tabs>
    </div>
    <div class="event-log" id="basic-log" role="log" aria-live="polite" aria-atomic="false"></div>
  </div>

  <div class="demo-section">
    <h2>Tabs with Footer & Actions</h2>
    <div class="demo-container with-footer">
      <sol-tabs id="tabs-with-footer"></sol-tabs>
      <div class="demo-footer">
        <div class="demo-actions" id="footer-actions"></div>
      </div>
    </div>
    <div class="event-log" id="footer-log" role="log" aria-live="polite" aria-atomic="false"></div>
  </div>

  <div class="demo-section">
    <h2>Subtabs (variant="sub")</h2>
    <div class="demo-container">
      <sol-tabs id="sub-tabs" variant="sub"></sol-tabs>
    </div>
  </div>

  <div class="demo-section">
    <h2>Single Tab (bar hidden)</h2>
    <div class="demo-container">
      <sol-tabs id="single-tab"></sol-tabs>
    </div>
  </div>

  <script type="module">
    import './sol-tabs.js';

    const basicTabs = document.getElementById('basic-tabs');
    const basicLog = document.getElementById('basic-log');
    
    basicTabs.tabs = [
      { 
        name: 'Overview', 
        render(body) {
          body.innerHTML = `
            <div class="content-block">
              <h3>Welcome to the Overview</h3>
              <p>This is the first tab with some introductory content.</p>
              <p>You can include any HTML elements here.</p>
            </div>
          `;
        }
      },
      { 
        name: 'Details', 
        render(body) {
          body.innerHTML = `
            <div class="content-block">
              <h3>Detailed Information</h3>
              <ul>
                <li>Feature one</li>
                <li>Feature two</li>
                <li>Feature three</li>
              </ul>
            </div>
          `;
        }
      },
      { 
        name: 'Settings', 
        render(body) {
          body.innerHTML = `
            <div class="content-block">
              <h3>Configuration</h3>
              <label style="display: block; margin-bottom: 8px;">
                <input type="checkbox"> Enable notifications
              </label>
              <label style="display: block;">
                <input type="checkbox" checked> Auto-save changes
              </label>
            </div>
          `;
        }
      }
    ];
    
    basicTabs.addEventListener('sol-tab-change', (e) => {
      basicLog.innerHTML += `Tab changed to: ${e.detail.name}<br>`;
      basicLog.scrollTop = basicLog.scrollHeight;
    });
    
    basicTabs.switchTab('Overview');

    const tabsWithFooter = document.getElementById('tabs-with-footer');
    const footerLog = document.getElementById('footer-log');
    const footerActions = document.getElementById('footer-actions');
    
    tabsWithFooter.actionsEl = footerActions;
    tabsWithFooter.tabs = [
      { 
        name: 'View', 
        render(body, footer, actions) {
          body.innerHTML = `
            <div class="content-block">
              <h3>View Mode</h3>
              <p>This tab demonstrates the actions footer.</p>
              <p>Notice the Close button below.</p>
            </div>
          `;
          
          actions.innerHTML = `
            <button class="action-btn" type="button">Close</button>
          `;
        }
      },
      { 
        name: 'Edit', 
        render(body, footer, actions) {
          body.innerHTML = `
            <div class="content-block">
              <h3>Edit Mode</h3>
              <textarea style="width: 100%; height: 120px; padding: 8px; font-family: inherit;" 
                        placeholder="Enter your content here..." 
                        aria-label="Content editor"></textarea>
            </div>
          `;
          
          actions.innerHTML = `
            <button class="action-btn" type="button">Cancel</button>
            <button class="action-btn primary" type="button">Save Changes</button>
          `;
        }
      }
    ];
    
    tabsWithFooter.addEventListener('sol-tab-change', (e) => {
      footerLog.innerHTML += `Switched to: ${e.detail.name}<br>`;
      footerLog.scrollTop = footerLog.scrollHeight;
    });
    
    tabsWithFooter.switchTab('View');

    const subTabs = document.getElementById('sub-tabs');
    subTabs.tabs = [
      { 
        name: 'Option A', 
        render(body) {
          body.innerHTML = `<p>Content for Option A with the slimmer subtab styling.</p>`;
        }
      },
      { 
        name: 'Option B', 
        render(body) {
          body.innerHTML = `<p>Content for Option B showing the variant="sub" appearance.</p>`;
        }
      },
      { 
        name: 'Option C', 
        render(body) {
          body.innerHTML = `<p>Content for Option C demonstrates nested tabs.</p>`;
        }
      }
    ];
    subTabs.switchTab('Option A');

    const singleTab = document.getElementById('single-tab');
    singleTab.tabs = [
      { 
        name: 'Only Tab', 
        render(body) {
          body.innerHTML = `
            <div class="content-block">
              <h3>Single Tab Example</h3>
              <p>When only one tab is provided, the tab bar is automatically hidden.</p>
            </div>
          `;
        }
      }
    ];
    singleTab.switchTab('Only Tab');
  </script>
</body>
</html>
