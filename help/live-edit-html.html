<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Live Editor</title>
  <link rel="stylesheet" href="../styles/sol-live-edit.css">
</head>
<body>
<header>
  <h1>HTML Live Editor</h1>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="loadBtn">Load</button>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="saveBtn">Save</button>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="cfgBtn">⚙</button>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="hlpBtn">?</button>
</header>
<sol-live-edit format="html" id="editor"></sol-live-edit>
<script type="module">
  import '../sol-live-edit.js';
  import { initTheme, setupLoadSave } from '../shared/sol-live-edit-utils.js';
  initTheme();
  setupLoadSave('editor', '.html,.htm,.txt', 'page.html', 'text/html');
  const ed = document.getElementById('editor');
  document.getElementById('cfgBtn').onclick = () => ed.toggleSettings();
  document.getElementById('hlpBtn').onclick = () => ed.toggleHelp();
</script>
</body>
</html>
