<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Live Editor</title>
  <link rel="stylesheet" href="../styles/sol-live-edit.css">
</head>
<body>
<header>
  <h1>Markdown Live Editor</h1>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="loadBtn">Load</button>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="saveBtn">Save</button>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="zmOutBtn">−</button>
  <span class="hdr-zoom" id="zmPct">100%</span>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="zmInBtn">+</button>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="cfgBtn">⚙</button>
  <button class="sol-btn sol-btn-sm sol-btn-ghost" id="hlpBtn">?</button>
</header>
<sol-live-edit format="markdown" id="editor"></sol-live-edit>
<script type="module">
  import '../sol-live-edit.js';
  import { initTheme, setupLoadSave } from '../shared/sol-live-edit-utils.js';
  initTheme();
  setupLoadSave('editor', '.md,.markdown,.txt', 'document.md', 'text/markdown');
  const ed = document.getElementById('editor');
  document.getElementById('zmOutBtn').onclick = () => ed.zoomOut();
  document.getElementById('zmInBtn').onclick  = () => ed.zoomIn();
  document.getElementById('cfgBtn').onclick = () => ed.toggleSettings();
  document.getElementById('hlpBtn').onclick = () => ed.toggleHelp();
  ed.addEventListener('sol-zoom', e => { document.getElementById('zmPct').textContent = e.detail.pct + '%'; });
</script>
</body>
</html>
