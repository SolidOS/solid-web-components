<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graphviz Live Editor</title>
  <link rel="stylesheet" href="../shared/page.css">
</head>
<body>
<header>
  <h1>Graphviz Live Editor</h1>
  <button class="hdr-btn" id="loadBtn">Load</button>
  <button class="hdr-btn" id="saveBtn">Save</button>
  <button class="hdr-btn" id="zmOutBtn">−</button>
  <span class="hdr-zoom" id="zmPct">100%</span>
  <button class="hdr-btn" id="zmInBtn">+</button>
  <button class="hdr-btn" id="cfgBtn">⚙</button>
  <button class="hdr-btn" id="hlpBtn">?</button>
</header>
<sol-live-edit format="graphviz" id="editor"></sol-live-edit>
<script type="module">
  import '../sol-live-edit.js';
  import { initTheme, setupLoadSave } from '../shared/page-utils.js';
  initTheme();
  setupLoadSave('editor', '.dot,.gv,.txt', 'graph.dot', 'text/vnd.graphviz');
  const ed = document.getElementById('editor');
  document.getElementById('zmOutBtn').onclick = () => ed.zoomOut();
  document.getElementById('zmInBtn').onclick  = () => ed.zoomIn();
  document.getElementById('cfgBtn').onclick   = () => ed.toggleSettings();
  document.getElementById('hlpBtn').onclick   = () => ed.toggleHelp();
  ed.addEventListener('sol-zoom', e => { document.getElementById('zmPct').textContent = e.detail.pct + '%'; });
</script>
</body>
</html>
