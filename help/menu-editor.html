<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Editor</title>
  <link rel="stylesheet" href="../styles/sol-query-help.css">
  <style>
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
    h1 { margin: .5rem 1rem; font-size: 1.3rem; }
    .toolbar { display: flex; gap: 8px; padding: 0 1rem .5rem; align-items: center; flex-wrap: wrap; font-size: .9rem; }
    .toolbar button {
      padding: 4px 14px; border: 1px solid #ccc; border-radius: 4px;
      background: #fff; cursor: pointer; font-size: .85rem; font-family: inherit;
    }
    .toolbar button:hover { background: #f3f4f6; }
    .toolbar .sep { border-left: 1px solid #ddd; height: 20px; }

    .editor-panes {
      flex: 1; display: flex; min-height: 0; border-top: 1px solid #dde;
    }
    .pane-form {
      flex: 1; overflow: auto; border-right: 1px solid #dde;
      display: flex; flex-direction: column;
    }
    .pane-form sol-form { flex: 1; min-height: 0; }
    .pane-preview {
      flex: 1; overflow: auto; padding: 1rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .preview-menu-wrap {
      border: 1px solid #dde; border-radius: 6px; padding: .5rem;
      min-height: 120px; background: #fafafa;
    }
    .preview-menu-wrap sol-menu { min-height: 100px; }

    #turtle-output {
      flex: 1; min-height: 100px; background: #f6f8fa;
      border: 1px solid #dde; border-radius: 4px;
      padding: .75rem 1rem; font-size: .8rem; overflow: auto;
      white-space: pre-wrap; font-family: 'Courier New', monospace;
      color: #333; line-height: 1.5;
    }
    #turtle-output:empty::before {
      content: 'Fill in the form to see the RDF Turtle output here.';
      color: #999; font-style: italic;
    }

    .pane-label { font-weight: 600; font-size: .85rem; color: #555; text-transform: uppercase; letter-spacing: .04em; }

    @media (max-width: 800px) {
      .editor-panes { flex-direction: column; }
      .pane-form { border-right: none; border-bottom: 1px solid #dde; max-height: 55vh; }
    }
  </style>

  <script type="importmap">{"imports":{
    "rdflib":    "https://esm.sh/rdflib",
    "dompurify": "https://esm.sh/dompurify",
    "marked":    "https://esm.sh/marked"
  }}</script>
  <script type="module">
    import * as $rdf from 'rdflib';
    import DOMPurify from 'dompurify';
    import { marked } from 'marked';
    window.$rdf      = $rdf;
    window.DOMPurify = DOMPurify;
    window.marked    = marked;
  </script>
  <script type="module" src="../web/sol-form.js"></script>
  <script type="module" src="../web/sol-menu.js"></script>
</head>
<body>
  <h1>Menu Editor</h1>
  <div class="toolbar">
    <button id="btn-preview">Refresh Preview</button>
    <button id="btn-turtle">Show Turtle</button>
    <div class="sep"></div>
    <span style="color:#666; font-size:.8rem">
      Edit mode: add <code>?edit=URL#fragment</code> to load an existing menu
    </span>
  </div>

  <div class="editor-panes">
    <div class="pane-form">
      <sol-form id="menu-form"
        source="../data/menu-form.ttl"
        shape="../shapes/menu.shacl">
      </sol-form>
    </div>

    <div class="pane-preview">
      <div>
        <span class="pane-label">Preview</span>
        <div class="preview-menu-wrap">
          <sol-menu id="menu-preview" orientation="horizontal"></sol-menu>
        </div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
        <span class="pane-label">Turtle Output</span>
        <pre id="turtle-output"></pre>
      </div>
    </div>
  </div>

  <script type="module">
    const form    = document.getElementById('menu-form');
    const preview = document.getElementById('menu-preview');
    const output  = document.getElementById('turtle-output');

    // Edit mode: ?edit=URL#fragment loads an existing menu
    const params = new URLSearchParams(location.search);
    const editUri = params.get('edit');
    if (editUri) {
      form.setAttribute('subject', editUri);
    }

    function updatePreview() {
      const turtle = form.getTurtle();
      output.textContent = turtle || '';
      if (!turtle) return;

      // Build a blob URL and point sol-menu at it
      const blob = new Blob([turtle], { type: 'text/turtle' });
      const url  = URL.createObjectURL(blob);

      // Find the subject fragment or use first blank node
      const subject = form.subject;
      const frag = subject && subject.value && subject.value.includes('#')
        ? '#' + subject.value.split('#')[1]
        : '';

      preview.removeAttribute('from-rdf');
      // Force re-render by briefly clearing, then setting new URL
      requestAnimationFrame(() => {
        preview.setAttribute('from-rdf', url + frag);
      });
    }

    document.getElementById('btn-preview').addEventListener('click', updatePreview);
    document.getElementById('btn-turtle').addEventListener('click', () => {
      output.textContent = form.getTurtle() || '(no data yet)';
    });

    // Auto-preview on form changes (debounced)
    let debounce;
    form.addEventListener('sol-form-change', () => {
      clearTimeout(debounce);
      debounce = setTimeout(updatePreview, 600);
    });
  </script>
</body>
</html>
